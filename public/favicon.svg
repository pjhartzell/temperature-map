  <rect x="2" y="10" width="6" height="6" rx="1" fill="#74add1"/>
  <rect x="10" y="10" width="6" height="6" rx="1" fill="#abd9e9"/>
  <rect x="18" y="10" width="6" height="6" rx="1" fill="#fee090"/>
